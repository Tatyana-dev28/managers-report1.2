services:
  backend:
    build:
      context: ./backend
    container_name: managers-report-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env.production
    environment:
      - PYTHONUNBUFFERED=1
    dns:
      - 1.1.1.1
      - 8.8.8.8
    expose:
      - "8000"
    networks:
      - report-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
    container_name: managers-report-frontend
    restart: unless-stopped
    environment:
      VITE_API_BASE_URL: "/api"
    ports:
      - "127.0.0.1:8099:80"
    depends_on:
      backend:
        condition: service_healthy
    dns:
      - 1.1.1.1
      - 8.8.8.8
    networks:
      - report-network

networks:
  report-network:
    driver: bridge