services:
  backend:
    build:
      context: ./backend
    env_file:
      - ./backend/.env.production
    expose:
      - "8000"

  frontend:
    build:
      context: ./frontend
    environment:
      VITE_API_BASE_URL: "/api"
    expose:
      - "80"

  caddy:
    image: caddy:2-alpine
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
      - frontend

volumes:
  caddy_data:
  caddy_config:
