server {
    listen 80;
    server_name manager-report.sappapp1b24.ru;

    location /api/ {
        proxy_pass http://managers-report-backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://managers-report-frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        add_header X-Frame-Options "ALLOW-FROM https://*.bitrix24.ru" always;
        add_header Content-Security-Policy "frame-ancestors https://*.bitrix24.ru https://*.bitrix24.com;" always;
    }
}

server {
    listen 443 ssl;
    server_name manager-report.sappapp1b24.ru;

    ssl_certificate /etc/letsencrypt/live/manager-report.sappapp1b24.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/manager-report.sappapp1b24.ru/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location /api/ {
        proxy_pass http://managers-report-backend:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    location / {
        proxy_pass http://managers-report-frontend:80;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        add_header X-Frame-Options "ALLOW-FROM https://*.bitrix24.ru" always;
        add_header Content-Security-Policy "frame-ancestors https://*.bitrix24.ru https://*.bitrix24.com;" always;
    }
}

server {
    listen 80;
    server_name manager-report.sappapp1b24.ru;
    return 301 https://$host$request_uri;
}