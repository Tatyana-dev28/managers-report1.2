<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Ежедневный отчет менеджера</title>
  </head>
  <body>
    <div id="app"></div>
    <script src="https://api.bitrix24.com/api/v1/"></script>
    <script>
      if (!window.BX24) {
        console.warn('BX24 not loaded from api.bitrix24.com, trying fallback...');
        const script = document.createElement('script');
        script.src = 'https://www.bitrix24.ru/api/v1/';
        document.head.appendChild(script);
      }
    </script>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
